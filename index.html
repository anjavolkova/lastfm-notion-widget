<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --surface: #f7f6f3;
    --surface-hover: #efeeeb;
    --border: #e8e5e0;
    --text-primary: #2c2c2b;
    --text-secondary: #7d7a75;
    --text-muted: #a09d98;
    --accent: #e8442b;
    --radius: 8px;
    --font-serif: Georgia, 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --right-col: 150px;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  /* ── WIDGET SHELL ── */
  #widget {
    display: flex;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
    gap: 0;
  }

  /* ── LEFT COLUMN (tabs + grid/list) ── */
  #left-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TABS */
  #tabs {
    display: flex;
    gap: 2px;
    padding: 10px 12px 6px;
    flex-shrink: 0;
  }
  .tab-btn {
    font-family: var(--font-serif);
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: none;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text-primary);
  }

  /* CONTENT AREA */
  #content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ALBUM GRID */
  #chart-view {
    height: 100%;
    overflow-y: auto;
    padding: 4px 12px 10px;
  }
  #album-grid {
    display: grid;
    gap: 5px;
    width: 100%;
  }

  .album-cell {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
  }
  .album-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .album-cell:hover img { transform: scale(1.05); }

  .album-tooltip {
    position: absolute;
    inset: 0;
    background: rgba(44,44,43,0.82);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 7px;
    opacity: 0;
    transition: opacity 0.18s;
    backdrop-filter: blur(2px);
  }
  .album-cell:hover .album-tooltip { opacity: 1; }
  .album-tooltip .tt-title {
    font-weight: 600;
    font-size: 10px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .album-tooltip .tt-artist {
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .album-tooltip .tt-plays {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .album-cell .no-art {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8e5e0 0%, #d4d0cb 100%);
    font-size: 8px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px;
  }

  /* RECENT TRACKS */
  #recent-view {
    height: 100%;
    overflow-y: auto;
    padding: 4px 8px 10px;
    display: none;
  }
  .track-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 5px;
    border-radius: 5px;
    transition: background 0.12s;
    cursor: pointer;
  }
  .track-item:hover { background: var(--surface); }
  .track-thumb {
    width: 34px;
    height: 34px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }
  .track-thumb.no-img {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    color: var(--text-muted);
    font-size: 10px;
  }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
  }
  .track-artist {
    font-size: 10px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-time {
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
    text-align: right;
    min-width: 38px;
  }
  .track-time.now-playing {
    color: var(--accent);
    font-weight: 600;
  }

  /* ── RIGHT COLUMN ── */
  #right-col {
    width: var(--right-col);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 10px 14px 12px 8px;
    overflow: hidden;
  }

  /* Period title */
  #period-wrapper { position: relative; }
  #period-btn {
    font-family: var(--font-serif);
    font-size: clamp(18px, 4.5vw, 28px);
    color: var(--text-primary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-align: left;
    line-height: 1.2;
    white-space: normal;
    word-break: break-word;
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }
  #period-btn:hover { color: var(--accent); }
  #period-btn .chevron {
    font-size: 0.5em;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-top: 4px;
    flex-shrink: 0;
  }
  #period-btn.open .chevron { transform: rotate(180deg); }

  #period-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    z-index: 100;
    min-width: 150px;
    overflow: hidden;
  }
  #period-dropdown.open { display: block; }
  .period-option {
    padding: 7px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .period-option:hover { background: var(--surface-hover); }
  .period-option.active { color: var(--accent); font-weight: 600; }

  /* Username */
  #username-link {
    font-family: var(--font-serif);
    font-size: clamp(12px, 2.5vw, 16px);
    color: var(--text-secondary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 3px;
    margin-top: 4px;
  }
  #username-link:hover { color: var(--text-primary); }

  /* Stats */
  #stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-item { white-space: nowrap; }
  .stat-num {
    font-weight: 700;
    font-size: clamp(12px, 2.5vw, 15px);
    color: var(--text-primary);
  }
  .stat-label {
    font-size: clamp(10px, 2vw, 13px);
    color: var(--text-secondary);
  }

  /* LOADING / ERROR */
  .state-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 12px;
    flex-direction: column;
    gap: 8px;
    padding: 16px;
    text-align: center;
  }
  .state-msg.error { color: #b04040; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="widget">

  <!-- ── LEFT: tabs + content ── -->
  <div id="left-col">
    <div id="tabs">
      <button class="tab-btn active" data-tab="chart">Chart</button>
      <button class="tab-btn" data-tab="recent">Recent tracks</button>
    </div>
    <div id="content">
      <div id="chart-view">
        <div id="loading" class="state-msg"><div class="spinner"></div><span>Loading…</span></div>
        <div id="album-grid" style="display:none;"></div>
        <div id="error-msg" class="state-msg error" style="display:none;"></div>
      </div>
      <div id="recent-view"></div>
    </div>
  </div>

  <!-- ── RIGHT: title + stats ── -->
  <div id="right-col">
    <div>
      <div id="period-wrapper">
        <button id="period-btn">
          <span id="period-label">Last 30 days</span>
          <span class="chevron">▼</span>
        </button>
        <div id="period-dropdown">
          <div class="period-option" data-period="7day">Last 7 days</div>
          <div class="period-option active" data-period="1month">Last 30 days</div>
          <div class="period-option" data-period="3month">Last 3 months</div>
          <div class="period-option" data-period="6month">Last 6 months</div>
          <div class="period-option" data-period="12month">Last 12 months</div>
          <div class="period-option" data-period="overall">All time</div>
        </div>
      </div>
      <a id="username-link" href="#" target="_blank">
        <span id="username-display">—</span>
        <svg width="13" height="13" viewBox="0 0 19 19" fill="none">
          <path d="M5.54 13.46L13.46 5.54M13.46 5.54H5.54M13.46 5.54V13.46" stroke="#7d7a75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <div id="stats">
      <div class="stat-item"><span class="stat-num" id="stat-artists">—</span> <span class="stat-label">Artists</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-albums">—</span> <span class="stat-label">Albums</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-tracks">—</span> <span class="stat-label">Tracks</span></div>
    </div>
  </div>

</div>

<script>
// ── EDIT THESE ─────────────────────────────────────────────
const API_KEY  = '636a4e93cbcf470a847fe48ee1641a76';   // ← paste your key here
const USERNAME = 'xowaltz';          // ← paste your username here
// ──────────────────────────────────────────────────────────

(function() {
  let currentPeriod = '1month';
  let currentTab = 'chart';

  const PERIOD_LABELS = {
    '7day':    'Last 7 days',
    '1month':  'Last 30 days',
    '3month':  'Last 3 months',
    '6month':  'Last 6 months',
    '12month': 'Last 12 months',
    'overall': 'All time'
  };

  const periodBtn      = document.getElementById('period-btn');
  const periodLabel    = document.getElementById('period-label');
  const periodDropdown = document.getElementById('period-dropdown');
  const usernameLink   = document.getElementById('username-link');
  const usernameDisplay= document.getElementById('username-display');
  const statArtists    = document.getElementById('stat-artists');
  const statAlbums     = document.getElementById('stat-albums');
  const statTracks     = document.getElementById('stat-tracks');
  const chartView      = document.getElementById('chart-view');
  const recentView     = document.getElementById('recent-view');
  const albumGrid      = document.getElementById('album-grid');
  const loadingEl      = document.getElementById('loading');
  const errorEl        = document.getElementById('error-msg');
  const tabBtns        = document.querySelectorAll('.tab-btn');

  // init username display
  usernameDisplay.textContent = USERNAME;
  usernameLink.href = `https://www.last.fm/user/${USERNAME}`;

  loadAll();

  // ── PERIOD DROPDOWN ────────────────────────────────────
  periodBtn.addEventListener('click', e => {
    e.stopPropagation();
    periodBtn.classList.toggle('open');
    periodDropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => {
    periodBtn.classList.remove('open');
    periodDropdown.classList.remove('open');
  });
  periodDropdown.querySelectorAll('.period-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      currentPeriod = opt.dataset.period;
      periodLabel.textContent = PERIOD_LABELS[currentPeriod];
      periodDropdown.querySelectorAll('.period-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      periodBtn.classList.remove('open');
      periodDropdown.classList.remove('open');
      loadAll();
    });
  });

  // ── TABS ───────────────────────────────────────────────
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      if (currentTab === 'chart') {
        chartView.style.display = '';
        recentView.style.display = 'none';
        loadChart();
      } else {
        chartView.style.display = 'none';
        recentView.style.display = '';
        loadRecent();
      }
    });
  });

  // ── API ────────────────────────────────────────────────
  async function lfmFetch(method, extra = {}) {
    const params = new URLSearchParams({ method, user: USERNAME, api_key: API_KEY, format: 'json', ...extra });
    const res = await fetch(`https://ws.audioscrobbler.com/2.0/?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.message || `Error ${data.error}`);
    return data;
  }

  async function loadAll() {
    loadStats();
    if (currentTab === 'chart') loadChart();
    else loadRecent();
  }

  // ── STATS ──────────────────────────────────────────────
  async function loadStats() {
    statArtists.textContent = '—'; statAlbums.textContent = '—'; statTracks.textContent = '—';
    try {
      const [a, al, tr] = await Promise.all([
        lfmFetch('user.gettopartists', { period: currentPeriod, limit: 1 }),
        lfmFetch('user.gettopalbums',  { period: currentPeriod, limit: 1 }),
        lfmFetch('user.gettoptracks',  { period: currentPeriod, limit: 1 })
      ]);
      statArtists.textContent = a.topartists['@attr']?.total  ?? '?';
      statAlbums.textContent  = al.topalbums['@attr']?.total  ?? '?';
      statTracks.textContent  = tr.toptracks['@attr']?.total  ?? '?';
    } catch(e) { /* silent */ }
  }

  // ── CHART ──────────────────────────────────────────────
  async function loadChart() {
    loadingEl.style.display = '';
    albumGrid.style.display = 'none';
    errorEl.style.display = 'none';
    try {
      const data = await lfmFetch('user.gettopalbums', { period: currentPeriod, limit: 50 });
      renderGrid(data.topalbums.album || []);
    } catch(e) { showError(e.message); }
  }

  function renderGrid(albums) {
    loadingEl.style.display = 'none';
    albumGrid.innerHTML = '';
    if (!albums.length) { showError('No album data for this period.'); return; }

    const cols = computeCols();
    albumGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    albumGrid.style.display = 'grid';

    albums.forEach(album => {
      const cell = document.createElement('div');
      cell.className = 'album-cell';

      const imgSrc = getBestImage(album.image);
      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc;
        img.alt = album.name;
        img.loading = 'lazy';
        img.onerror = function() {
          this.parentNode.replaceChild(makeNoArt(album.name), this);
        };
        cell.appendChild(img);
      } else {
        cell.appendChild(makeNoArt(album.name));
      }

      const tip = document.createElement('div');
      tip.className = 'album-tooltip';
      tip.innerHTML = `
        <div class="tt-title">${esc(album.name)}</div>
        <div class="tt-artist">${esc(album.artist.name)}</div>
        <div class="tt-plays">${Number(album.playcount).toLocaleString()} plays</div>`;
      cell.appendChild(tip);
      cell.addEventListener('click', () => window.open(album.url, '_blank'));
      albumGrid.appendChild(cell);
    });
  }

  function makeNoArt(name) {
    const d = document.createElement('div');
    d.className = 'no-art';
    d.textContent = name;
    return d;
  }

  function computeCols() {
    const w = document.getElementById('content').offsetWidth - 24;
    if (w < 150) return 2;
    if (w < 240) return 3;
    if (w < 340) return 4;
    if (w < 460) return 5;
    if (w < 580) return 6;
    return 7;
  }

  // ── RECENT ─────────────────────────────────────────────
  async function loadRecent() {
    recentView.innerHTML = '<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';
    try {
      const data = await lfmFetch('user.getrecenttracks', { limit: 50 });
      renderRecent(data.recenttracks.track || []);
    } catch(e) {
      recentView.innerHTML = `<div class="state-msg error">${esc(e.message)}</div>`;
    }
  }

  function renderRecent(tracks) {
    recentView.innerHTML = '';
    if (!tracks.length) {
      recentView.innerHTML = '<div class="state-msg">No recent tracks.</div>';
      return;
    }
    tracks.forEach(track => {
      const nowPlaying = track['@attr']?.nowplaying === 'true';
      const item = document.createElement('div');
      item.className = 'track-item';

      const imgSrc = getBestImage(track.image);
      const thumbEl = imgSrc
        ? `<img class="track-thumb" src="${esc(imgSrc)}" alt="" loading="lazy">`
        : `<div class="track-thumb no-img">♪</div>`;

      const timeEl = nowPlaying
        ? `<span class="track-time now-playing">▶ now</span>`
        : `<span class="track-time">${formatTime(track.date?.uts)}</span>`;

      item.innerHTML = `
        ${thumbEl}
        <div class="track-info">
          <div class="track-name">${esc(track.name)}</div>
          <div class="track-artist">${esc(track.artist['#text'] || track.artist?.name || '')}</div>
        </div>
        ${timeEl}`;
      item.addEventListener('click', () => track.url && window.open(track.url, '_blank'));
      recentView.appendChild(item);
    });
  }

  // ── HELPERS ────────────────────────────────────────────
  function getBestImage(images) {
    if (!images?.length) return null;
    for (const size of ['extralarge','large','medium','small']) {
      const f = images.find(i => i.size === size && i['#text']);
      if (f) return f['#text'];
    }
    return images[images.length - 1]?.['#text'] || null;
  }

  function formatTime(uts) {
    if (!uts) return '';
    const diff = Math.floor((Date.now() - uts * 1000) / 1000);
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800)return `${Math.floor(diff/86400)}d ago`;
    return new Date(uts*1000).toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showError(msg) {
    loadingEl.style.display = 'none';
    albumGrid.style.display = 'none';
    errorEl.style.display = '';
    errorEl.textContent = msg;
  }

  // Recompute grid cols on resize
  let rt;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => {
      if (currentTab === 'chart' && albumGrid.style.display !== 'none') {
        albumGrid.style.gridTemplateColumns = `repeat(${computeCols()}, 1fr)`;
      }
    }, 120);
  });
})();
</script>
</body>
</html>
