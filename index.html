<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last.fm Monthly Topster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .config-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .config-panel h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #888;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .album-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .album-info {
            padding: 15px;
        }

        .album-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.95em;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .artist-name {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .play-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-block;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Last.fm Monthly Topster</h1>
            <p>Your top albums from the last 30 days</p>
        </div>

        <div class="config-panel" id="configPanel">
            <h2>Configuration</h2>
            <div class="form-group">
                <label for="username">Last.fm Username</label>
                <input type="text" id="username" placeholder="Enter your Last.fm username">
            </div>
            <div class="form-group">
                <label for="apiKey">Last.fm API Key</label>
                <input type="text" id="apiKey" placeholder="Enter your API key">
                <small>Get your free API key at <a href="https://www.last.fm/api/account/create" target="_blank">last.fm/api/account/create</a></small>
            </div>
            <button onclick="fetchData()">Load My Topster</button>
        </div>

        <div id="error"></div>
        <div id="stats"></div>
        <div id="loading"></div>
        <div class="grid" id="albumGrid"></div>
    </div>

    <script>
        let username = localStorage.getItem('lastfm_username') || '';
        let apiKey = localStorage.getItem('lastfm_apikey') || '';

        // Load saved credentials
        if (username) document.getElementById('username').value = username;
        if (apiKey) document.getElementById('apiKey').value = apiKey;

        // Auto-load if credentials exist
        if (username && apiKey) {
            fetchData();
        }

        async function fetchData() {
            const usernameInput = document.getElementById('username').value.trim();
            const apiKeyInput = document.getElementById('apiKey').value.trim();

            if (!usernameInput || !apiKeyInput) {
                showError('Please enter both username and API key');
                return;
            }

            // Save credentials
            localStorage.setItem('lastfm_username', usernameInput);
            localStorage.setItem('lastfm_apikey', apiKeyInput);
            username = usernameInput;
            apiKey = apiKeyInput;

            document.getElementById('error').innerHTML = '';
            document.getElementById('loading').innerHTML = '<div class="loading">Loading your top albums...</div>';
            document.getElementById('albumGrid').innerHTML = '';
            document.getElementById('stats').innerHTML = '';

            try {
                const period = '1month';
                const limit = 25;
                const url = `https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=${encodeURIComponent(username)}&period=${period}&limit=${limit}&api_key=${apiKey}&format=json`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.message || 'Last.fm API error');
                }

                if (!data.topalbums || !data.topalbums.album || data.topalbums.album.length === 0) {
                    showError('No albums found for this period. Make sure you\'ve been scrobbling!');
                    return;
                }

                displayStats(data.topalbums);
                displayAlbums(data.topalbums.album);
                document.getElementById('loading').innerHTML = '';
            } catch (error) {
                showError(`Error: ${error.message}`);
                document.getElementById('loading').innerHTML = '';
            }
        }

        function displayStats(topalbums) {
            const albums = topalbums.album;
            const totalPlays = albums.reduce((sum, album) => sum + parseInt(album.playcount), 0);
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${albums.length}</div>
                    <div class="stat-label">Top Albums</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${totalPlays}</div>
                    <div class="stat-label">Total Plays</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${topalbums['@attr'].user}</div>
                    <div class="stat-label">User</div>
                </div>
            `;
        }

        function displayAlbums(albums) {
            const grid = document.getElementById('albumGrid');
            
            albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                
                // Get the largest available image
                const imageUrl = album.image.find(img => img.size === 'extralarge')?.['#text'] || 
                                album.image.find(img => img.size === 'large')?.['#text'] || 
                                album.image[album.image.length - 1]['#text'] || 
                                '';

                card.innerHTML = `
                    <img class="album-cover" src="${imageUrl}" alt="${album.name}" onerror="this.style.display='none'">
                    <div class="album-info">
                        <div class="album-name">${album.name}</div>
                        <div class="artist-name">${album.artist.name}</div>
                        <span class="play-count">${album.playcount} plays</span>
                    </div>
                `;

                card.onclick = () => window.open(album.url, '_blank');
                grid.appendChild(card);
            });
        }

        function showError(message) {
            document.getElementById('error').innerHTML = `<div class="error">${message}</div>`;
        }

        // Auto-refresh every 5 minutes if credentials are saved
        if (username && apiKey) {
            setInterval(() => {
                fetchData();
            }, 5 * 60 * 1000);
        }
    </script>
</body>
</html>
