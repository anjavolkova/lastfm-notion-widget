<!DOCTYPE html>
<html lang="en">
<head>
 	
 <link rel="preconnect" href="https://fonts.googleapis.com">
	
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Widget</title>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --surface: #f7f6f3;
    --surface-hover: #efeeeb;
    --border: #e8e5e0;
    --text-primary: #2c2c2b;
    --text-secondary: #7d7a75;
    --text-muted: #a09d98;
    --accent: #F1047E;
    --radius: 8px;
    --font-serif: "Fraunces", serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 24px;
  }
  #setup-card {
    width: 100%;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #setup-card h2 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--text-primary);
  }
  #setup-card p {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-top: -8px;
  }
  .setup-field { display: flex; flex-direction: column; gap: 5px; }
  .setup-field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .setup-field input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .setup-field input:focus { border-color: var(--text-secondary); }
  #setup-btn {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: var(--font-serif);
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    transition: background 0.15s;
    align-self: flex-start;
  }
  #setup-btn:hover { background: var(--surface-hover); }
  #setup-err { font-size: 11px; color: var(--accent); display: none; margin-top: -8px; }

  /* ── WIDGET ── */
  #widget {
    display: none;
    flex-direction: row;
    height: 100vh;
    overflow: hidden;
  }

  /* ── LEFT COL ── */
  #left-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #tabs {
    display: flex;
    gap: 2px;
    padding: 10px 12px 6px;
    flex-shrink: 0;
  }
  .tab-btn {
    font-family: var(--font-serif);
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: none;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
  .tab-btn.active { background: var(--surface); color: var(--text-primary); }

  #content { flex: 1; overflow: hidden; min-height: 0; }

  /* ── CHART ── */
  #chart-view {
    height: 100%;
    padding: 4px 12px 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #album-grid {
    display: none;
    gap: 4px;
    overflow: hidden;
  }
  /* square cells via padding trick */
  .album-cell {
    position: relative;
    border-radius: 5px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
  }
  .album-cell::before { content: ''; display: block; padding-top: 100%; }
  .album-cell img,
  .no-art,
  .album-tooltip {
    position: absolute;
    inset: 0;
  }
  .album-cell img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .album-cell:hover img { transform: scale(1.06); }
  .no-art {
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e8e5e0, #d0cdc8);
    font-size: 8px; color: var(--text-muted); text-align: center; padding: 4px;
  }
  .album-tooltip {
    background: rgba(30,29,28,0.78);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 7px;
    opacity: 0;
    transition: opacity 0.16s;
    backdrop-filter: blur(3px);
  }
  .album-cell:hover .album-tooltip { opacity: 1; }
  .tt-title {
    font-family: var(--font-serif);
    font-size: 10px; font-weight: 600; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tt-artist { font-size: 9px; color: rgba(255,255,255,0.65); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tt-plays  { font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 2px; }

  /* ── RECENT TRACKS ── */
  #recent-view {
    display: none;
    height: 100%;
    overflow-y: auto;
    padding: 2px 8px 10px;
  }
  .track-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 5px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .track-item:hover { background: var(--surface); }
  .track-thumb {
    width: 36px; height: 36px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
    display: block;
  }
  .track-thumb-placeholder {
    width: 36px; height: 36px;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
  }
  .track-info { flex: 1; min-width: 0; }
  .track-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 11px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 1px;
  }
  .track-time {
    font-size: 10px; color: var(--text-muted);
    flex-shrink: 0; white-space: nowrap;
  }
  .track-time.live {
    color: var(--accent); font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .live-dot {
    width: 5px; height: 5px;
    background: var(--accent); border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.6)} }

  /* ── RIGHT COL ── */
  #right-col {
	width: 18vw;
  	flex-shrink: 0;
  	display: flex;
  	flex-direction: column;
  	justify-content: space-between;
  	padding: 40px 14px 12px 6px;
  }
	
  #period-wrapper { position: relative; }

#header {
  display: flex;
  flex-direction: column;
  gap: 0.2vh;
}
	
  #period-btn {
    font-family: var(--font-serif);
    font-size: clamp(17px, 3.8vw, 26px);
    color: var(--text-primary);
    background: none; border: none; cursor: pointer;
    padding: 0; text-align: left; line-height: 1;
    display: flex; align-items: flex-start; gap: 4px;
    transition: 0.15s ease-in;
  }
  #period-btn:hover { color: var(--accent); }

  #period-dropdown {
    position: absolute; top: calc(100% + 4px); right: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.1);
    z-index: 100; min-width: 155px; overflow: hidden;
	transition: all 0.15s ease-in;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
  }
  #period-dropdown.open {     
	  opacity: 1;
      visibility: visible;
      transform: translateY(0); }
  .period-option {
    padding: 8px 13px; cursor: pointer;
    font-size: 13px; color: var(--text-primary);
    white-space: nowrap; transition: background 0.15s;
  }
  .period-option:hover { background: var(--surface-hover); }
  .period-option.active { color: var(--accent); font-weight: 600; }

  #username-link {
    font-family: var(--font-serif);
    font-size: clamp(12px, 2.2vw, 16px);
    color: var(--text-secondary);
    text-decoration: none;
    display: flex; align-items: center; gap: 3px;
	transition: 0.15s ease-in;
	margin-top: 0.5vh;
  }
  #username-link:hover { color: var(--text-primary); }
	
  #username-link svg { 
	width: clamp(14px, 2.2vw, 16px);
	height: clamp(14px, 2.2vw, 16px);
  }
 #username-link svg path {
	 stroke: var(--text-secondary);
	 transition: 0.15s ease-in;
 }
#username-link:hover svg path {
	 stroke: var(--text-primary);
 }
  #change-user-btn {
    background: none; border: none; cursor: pointer;
    font-size: 10px; color: var(--text-muted);
    padding: 0; margin-top: 0.2vh;
    font-family: var(--font-sans);
    display: block; text-align: left;
	transition: 0.15s;
  }
  #change-user-btn:hover { color: var(--text-secondary); text-decoration: underline; }

  #stats { display: flex; flex-direction: column; }
  .stat-num { 
	  font-weight: 400;
      font-size: clamp(16px, 3vw, 24px);
  	  color: var(--text-primary);
  	  font-family: var(--font-serif);}
  .stat-label { font-size: 12px; color: var(--text-secondary); }

  /* ── STATES ── */
  .state-msg {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); font-size: 12px;
    flex-direction: column; gap: 8px;
    text-align: center; padding: 16px;
  }
  .state-msg.error { color: #b04040; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--text-secondary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
	<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script> 
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <div id="setup-card">
    <h2>Last.fm Stats</h2>
    <p>Enter your Last.fm username to get started.</p>
    <div class="setup-field">
      <label>Username</label>
      <input id="inp-user" type="text" autocomplete="off" spellcheck="false">
    </div>
    <div id="setup-err"></div>
    <button id="setup-btn">Let's go</button>
  </div>
</div>

<!-- WIDGET -->
<div id="widget">
  <!-- LEFT: tabs + content -->
  <div id="left-col">
    <div id="tabs">
      <button class="tab-btn active" data-tab="chart">Chart</button>
      <button class="tab-btn" data-tab="recent">Recent tracks</button>
    </div>
    <div id="content">
      <div id="chart-view">
        <div id="chart-state" class="state-msg"><div class="spinner"></div><span>Loading…</span></div>
        <div id="album-grid"></div>
      </div>
      <div id="recent-view"></div>
    </div>
  </div>

  <!-- RIGHT: title + stats -->
  <div id="right-col">
    <div id="header">
      <div id="period-wrapper">
        <button id="period-btn">
          <span id="period-label">Last 30 days</span>
        </button>
        <div id="period-dropdown">
          <div class="period-option" data-period="7day">Last 7 days</div>
          <div class="period-option active" data-period="1month">Last 30 days</div>
          <div class="period-option" data-period="3month">Last 3 months</div>
          <div class="period-option" data-period="6month">Last 6 months</div>
          <div class="period-option" data-period="12month">Last 12 months</div>
          <div class="period-option" data-period="overall">All time</div>
        </div>
      </div>
      <a id="username-link" href="#" target="_blank">
        <span id="username-display"></span>
        <svg width="12" height="12" viewBox="0 0 19 19" fill="none">
          <path d="M5.54 13.46L13.46 5.54M13.46 5.54H5.54M13.46 5.54V13.46" stroke="#7d7a75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <button id="change-user-btn">change user</button>
    </div>
    <div id="stats">
      <div class="stat-item"><span class="stat-num" id="stat-artists">—</span> <span class="stat-label">Artists</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-albums">—</span> <span class="stat-label">Albums</span></div>
      <div class="stat-item"><span class="stat-num" id="stat-tracks">—</span> <span class="stat-label">Tracks</span></div>
    </div>
  </div>
</div>

<script>
// ── HARD-CODED API KEY — replace this with your own ────────
const API_KEY = '636a4e93cbcf470a847fe48ee1641a76';
// ──────────────────────────────────────────────────────────

(function () {
  let USERNAME = localStorage.getItem('lfm_username') || '';
  let currentPeriod = '1month';
  let currentTab = 'chart';

  const PERIOD_LABELS = {
    '7day':'Last 7 days','1month':'Last 30 days','3month':'Last 3 months',
    '6month':'Last 6 months','12month':'Last 12 months','overall':'All time'
  };

  const setupScreen    = document.getElementById('setup-screen');
  const inpUser        = document.getElementById('inp-user');
  const setupBtn       = document.getElementById('setup-btn');
  const setupErr       = document.getElementById('setup-err');
  const widgetEl       = document.getElementById('widget');
  const periodBtn      = document.getElementById('period-btn');
  const periodLabel    = document.getElementById('period-label');
  const periodDropdown = document.getElementById('period-dropdown');
  const usernameLink   = document.getElementById('username-link');
  const usernameDisp   = document.getElementById('username-display');
  const changeUserBtn  = document.getElementById('change-user-btn');
  const statArtists    = document.getElementById('stat-artists');
  const statAlbums     = document.getElementById('stat-albums');
  const statTracks     = document.getElementById('stat-tracks');
  const chartView      = document.getElementById('chart-view');
  const chartState     = document.getElementById('chart-state');
  const albumGrid      = document.getElementById('album-grid');
  const recentView     = document.getElementById('recent-view');
  const tabBtns        = document.querySelectorAll('.tab-btn');

  // boot
  if (USERNAME) launch();

  // ── SETUP ──────────────────────────────────────────────
  setupBtn.addEventListener('click', trySetup);
  inpUser.addEventListener('keydown', e => { if (e.key === 'Enter') trySetup(); });

  function trySetup() {
    const u = inpUser.value.trim();
    if (!u) { showSetupErr('Please enter a username.'); return; }
    USERNAME = u;
    localStorage.setItem('lfm_username', u);
    launch();
  }
  function showSetupErr(msg) { setupErr.textContent = msg; setupErr.style.display = 'block'; }

  changeUserBtn.addEventListener('click', () => {
    localStorage.removeItem('lfm_username');
    USERNAME = '';
    widgetEl.style.display = 'none';
    setupScreen.style.display = 'flex';
    inpUser.value = '';
    setupErr.style.display = 'none';
  });

  function launch() {
    setupScreen.style.display = 'none';
    widgetEl.style.display = 'flex';
    usernameDisp.textContent = USERNAME;
    usernameLink.href = `https://www.last.fm/user/${encodeURIComponent(USERNAME)}`;
    loadAll();
  }

  // ── PERIOD ─────────────────────────────────────────────
  periodBtn.addEventListener('click', e => {
    e.stopPropagation();
    periodBtn.classList.toggle('open');
    periodDropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => {
    periodBtn.classList.remove('open');
    periodDropdown.classList.remove('open');
  });
  periodDropdown.querySelectorAll('.period-option').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      currentPeriod = opt.dataset.period;
      periodLabel.textContent = PERIOD_LABELS[currentPeriod];
      periodDropdown.querySelectorAll('.period-option').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      periodBtn.classList.remove('open');
      periodDropdown.classList.remove('open');
      loadStats();
      if (currentTab === 'chart') loadChart();
    });
  });

  // ── TABS ───────────────────────────────────────────────
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      if (currentTab === 'chart') {
        chartView.style.display = 'flex';
        recentView.style.display = 'none';
        loadChart();
      } else {
        chartView.style.display = 'none';
        recentView.style.display = 'block';
        loadRecent();
      }
    });
  });

  // ── API ────────────────────────────────────────────────
  async function lfm(method, extra = {}) {
    const p = new URLSearchParams({ method, user: USERNAME, api_key: API_KEY, format: 'json', ...extra });
    const r = await fetch(`https://ws.audioscrobbler.com/2.0/?${p}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (d.error) throw new Error(d.message || `Error ${d.error}`);
    return d;
  }

  function loadAll() { loadStats(); loadChart(); }

  // ── STATS ──────────────────────────────────────────────
  async function loadStats() {
    statArtists.textContent = statAlbums.textContent = statTracks.textContent = '—';
    try {
      const [a, al, tr] = await Promise.all([
        lfm('user.gettopartists', { period: currentPeriod, limit: 1 }),
        lfm('user.gettopalbums',  { period: currentPeriod, limit: 1 }),
        lfm('user.gettoptracks',  { period: currentPeriod, limit: 1 })
      ]);
      statArtists.textContent = a.topartists['@attr']?.total  ?? '?';
      statAlbums.textContent  = al.topalbums['@attr']?.total  ?? '?';
      statTracks.textContent  = tr.toptracks['@attr']?.total  ?? '?';
    } catch (_) {}
  }

  // ── CHART ──────────────────────────────────────────────
  async function loadChart() {
    chartState.style.display = 'flex';
    chartState.className = 'state-msg';
    chartState.innerHTML = '<div class="spinner"></div><span>Loading…</span>';
    albumGrid.style.display = 'none';
    try {
      const data = await lfm('user.gettopalbums', { period: currentPeriod, limit: 50 });
      renderGrid(data.topalbums.album || []);
    } catch (e) {
      chartState.className = 'state-msg error';
      chartState.textContent = e.message;
    }
  }

  function renderGrid(albums) {
    chartState.style.display = 'none';
    albumGrid.innerHTML = '';
    if (!albums.length) {
      chartState.className = 'state-msg';
      chartState.textContent = 'No album data for this period.';
      chartState.style.display = 'flex';
      return;
    }

    const contentEl = document.getElementById('content');
    const availW = contentEl.offsetWidth - 24;
    const availH = contentEl.offsetHeight - 8;

    // cols based on width
    let cols = 5;
    if (availW < 150) cols = 2;
    else if (availW < 240) cols = 3;
    else if (availW < 340) cols = 4;
    else if (availW < 460) cols = 5;
    else if (availW < 580) cols = 6;
    else if (availW < 720) cols = 7;
    else cols = 8;

    const cellSize = Math.floor((availW - (cols - 1) * 4) / cols);
    const rows = Math.max(1, Math.floor((availH + 4) / (cellSize + 4)));
    const total = cols * rows;

    albumGrid.style.display = 'grid';
    albumGrid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
    albumGrid.style.gridTemplateRows    = `repeat(${rows}, ${cellSize}px)`;

    albums.slice(0, total).forEach(album => {
      const cell = document.createElement('div');
      cell.className = 'album-cell';

      const imgSrc = bestImg(album.image);
      if (imgSrc) {
        const img = document.createElement('img');
        img.src = imgSrc; img.alt = ''; img.loading = 'lazy';
        img.onerror = function () { this.replaceWith(makeNoArt(album.name)); };
        cell.appendChild(img);
      } else {
        cell.appendChild(makeNoArt(album.name));
      }

      const tip = document.createElement('div');
      tip.className = 'album-tooltip';
      tip.innerHTML = `
        <div class="tt-title">${esc(album.name)}</div>
        <div class="tt-artist">${esc(album.artist.name)}</div>
        <div class="tt-plays">${Number(album.playcount).toLocaleString()} plays</div>`;
      cell.appendChild(tip);
      cell.addEventListener('click', () => window.open(album.url, '_blank'));
      albumGrid.appendChild(cell);
    });
  }

  function makeNoArt(name) {
    const d = document.createElement('div');
    d.className = 'no-art';
    d.textContent = name;
    return d;
  }

  // ── RECENT TRACKS ──────────────────────────────────────
  async function loadRecent() {
    recentView.innerHTML = '<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';
    try {
      const data = await lfm('user.getrecenttracks', { limit: 50 });
      // API can return a single object instead of array when only 1 track
      const raw = data.recenttracks.track;
      const tracks = Array.isArray(raw) ? raw : raw ? [raw] : [];
      renderRecent(tracks);
    } catch (e) {
      recentView.innerHTML = `<div class="state-msg error">${esc(e.message)}</div>`;
    }
  }

  function renderRecent(tracks) {
    recentView.innerHTML = '';
    if (!tracks.length) {
      recentView.innerHTML = '<div class="state-msg">No tracks found.</div>';
      return;
    }

    tracks.forEach(track => {
      const nowPlaying = track['@attr']?.nowplaying === 'true';
      const artistName = track.artist?.['#text'] || track.artist?.name || '';
      const imgSrc = bestImg(track.image);

      const item = document.createElement('div');
      item.className = 'track-item';

      // thumbnail
      if (imgSrc) {
        const img = document.createElement('img');
        img.className = 'track-thumb';
        img.src = imgSrc;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = function () { this.replaceWith(makePlaceholder()); };
        item.appendChild(img);
      } else {
        item.appendChild(makePlaceholder());
      }

      // track info
      const info = document.createElement('div');
      info.className = 'track-info';
      info.innerHTML = `<div class="track-name">${esc(track.name)}</div><div class="track-artist">${esc(artistName)}</div>`;
      item.appendChild(info);

      // timestamp
      const timeEl = document.createElement('div');
      if (nowPlaying) {
        timeEl.className = 'track-time live';
        timeEl.innerHTML = '<span class="live-dot"></span>now';
      } else {
        timeEl.className = 'track-time';
        timeEl.textContent = fmtTime(track.date?.uts);
      }
      item.appendChild(timeEl);

      item.addEventListener('click', () => track.url && window.open(track.url, '_blank'));
      recentView.appendChild(item);
    });
  }

  function makePlaceholder() {
    const d = document.createElement('div');
    d.className = 'track-thumb-placeholder';
    d.textContent = '♪';
    return d;
  }

  // ── HELPERS ────────────────────────────────────────────
  function bestImg(images) {
    if (!images?.length) return null;
    for (const sz of ['extralarge', 'large', 'medium', 'small']) {
      const f = images.find(i => i.size === sz && i['#text']);
      if (f) return f['#text'];
    }
    return images[images.length - 1]?.['#text'] || null;
  }

  function fmtTime(uts) {
    if (!uts) return '';
    const s = Math.floor(Date.now() / 1000 - Number(uts));
    if (s < 60)     return 'just now';
    if (s < 3600)   return `${Math.floor(s / 60)}m ago`;
    if (s < 86400)  return `${Math.floor(s / 3600)}h ago`;
    if (s < 604800) return `${Math.floor(s / 86400)}d ago`;
    return new Date(uts * 1000).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // recompute grid on resize
  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => { if (currentTab === 'chart' && USERNAME) loadChart(); }, 150);
  });

})();
</script>
</body>
</html>
